name: Daily Tieba Sign-In 2

on:
  workflow_dispatch:
  schedule:
    - cron: '10 16 * * *' # cron表达式，时区是UTC时间，我们是UTC+8小时,UTC 22:30 = 北京时间次日 06:30

jobs:
  signin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Random delay
        env:
          DELAY_MIN: 0
          DELAY_MAX: 60
        run: |
          python3 << 'EOF'
          import os, random, time, sys
          min_d = int(os.environ['DELAY_MIN'])
          max_d = int(os.environ['DELAY_MAX'])
          RANDOM_DELAY = random.randint(min_d, max_d)
          total = RANDOM_DELAY * 60
          summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(summary, 'a') as f:
              f.write(f'## ⏱️ 随机延迟: {RANDOM_DELAY} 分钟\n\n')
          
          for i in range(1, total + 1):
              if i % 60 == 0:
                  elapsed = i // 60
                  remaining = RANDOM_DELAY - elapsed
                  with open(summary, 'a') as f:
                      f.write(f'- #等待 {elapsed} 分钟，剩余 {remaining} 分钟\n')
              time.sleep(1)
          
          with open(summary, 'a') as f:
              f.write(f'\n✅ 延迟结束，开始执行签到任务！\n')
          EOF

      - name: Run sign-in
        env:
          BDUSS: ${{ secrets.BDUSS2 }}
        run: python run.py

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
