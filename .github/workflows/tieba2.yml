name: Daily Tieba Sign-In 2

on:
  workflow_dispatch:
  schedule:
    - cron: '10 16 * * *' # cron表达式，时区是UTC时间，比我们早8小时,UTC 22:30 = 北京时间次日 06:30

env:
  DELAY_MIN: 0
  DELAY_MAX: 60
  
jobs:
  signin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Random delay
        run: |
          RANDOM_DELAY=$(( RANDOM % (${{ env.DELAY_MAX }} - ${{ env.DELAY_MIN }} + 1) + ${{ env.DELAY_MIN }} ))
          echo "随机延迟 ${RANDOM_DELAY} 分钟后开始执行..."
          sleep ${RANDOM_DELAY}m

      - name: Run sign-in
        env:
          BDUSS: ${{ secrets.BDUSS2 }}
        run: python run.py

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
