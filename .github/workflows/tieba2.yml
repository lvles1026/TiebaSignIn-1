name: Daily Tieba Sign-In 2

on:
  workflow_dispatch:
  schedule:
    - cron: '10 16 * * *' # cron表达式，时区是UTC时间，我们是UTC+8小时,UTC 22:30 = 北京时间次日 06:30

env:
  DELAY_MIN: 0
  DELAY_MAX: 60
  
jobs:
  signin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Random delay
        run: |
          RANDOM_DELAY=$(( RANDOM % (${{ env.DELAY_MAX }} - ${{ env.DELAY_MIN }} + 1) + ${{ env.DELAY_MIN }} ))
          #将分钟转换为秒，用于循环计算
          TOTAL_SECONDS=$(( RANDOM_DELAY * 60 ))
          
          echo "========================================"
          echo "⏱️ 随机延迟: ${RANDOM_DELAY} 分钟"
          echo "⏳ 开始倒计时..."
          echo "========================================"
          
          # 循环倒计时，每300秒输出一次剩余时间
          # 如果延迟时间很短（<1分钟），则直接 sleep
          if [ $TOTAL_SECONDS -le 0 ]; then
            echo "无需延迟，立即执行。"
          else
            for (( i=1; i<=TOTAL_SECONDS; i++ )); do
              # 每300秒（5分钟）输出一次日志，避免日志刷屏
              if (( i % 300 == 0 )); then
                ELAPSED_MIN=$(( i / 60 ))
                REMAINING_MIN=$(( (TOTAL_SECONDS - i) / 60 ))
                REMAINING_SEC=$(( (TOTAL_SECONDS - i) % 60 ))
                echo "⏳ 已等待 ${ELAPSED_MIN} 分钟 | 剩余约 ${REMAINING_MIN} 分 ${REMAINING_SEC} 秒..."
              fi
              sleep 1
            done
            echo "✅ 延迟结束，开始执行签到任务！"
          fi

      - name: Run sign-in
        env:
          BDUSS: ${{ secrets.BDUSS2 }}
        run: python run.py

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
